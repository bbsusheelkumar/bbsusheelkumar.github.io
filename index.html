  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Susheel Kumar B B</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #f5f4f0; color: #111; font-family: "Georgia", "Times New Roman", serif; min-height: 100vh; display: flex;
  flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; }
      .card { max-width: 480px; width: 100%; text-align: center; }
      .dot-wrap { display: flex; justify-content: center; gap: 8px; margin-bottom: 48px; }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: #111; animation: dot-bounce 1.4s ease-in-out infinite; }
      .dot:nth-child(2) { animation-delay: 0.2s; }
      .dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes dot-bounce { 0%,80%,100% { transform: scaleY(1); opacity: 0.25; } 40% { transform: scaleY(1.8); opacity: 1; } }
      .label { font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; color: #999; margin-bottom: 20px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .name { font-size: clamp(2.2rem, 6vw, 3.4rem); font-weight: 400; letter-spacing: -0.02em; line-height: 1.15; margin-bottom:
  24px; font-style: italic; }
      .divider { width: 40px; height: 1px; background: #ccc; margin: 0 auto 24px; }
      .message { font-size: 1rem; color: #555; line-height: 1.7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
  sans-serif; margin-bottom: 40px; }
      .message em { font-style: normal; color: #111; font-weight: 500; }
      .link { display: inline-block; font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase; color: #111;
  text-decoration: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; border-bottom: 1px solid #111;
  padding-bottom: 2px; transition: opacity 0.2s; }
      .link:hover { opacity: 0.45; }
      .footnote { margin-top: 64px; font-size: 0.7rem; color: #bbb; letter-spacing: 0.06em; font-family: -apple-system,
  BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="dot-wrap"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      <p class="label">You've arrived somewhere quiet</p>
      <h1 class="name">Susheel Kumar B B</h1>
      <div class="divider"></div>
      <p class="message">isn't on this page.<br>But something he built is <em>watching</em> —<br>one floor up.</p>
      <a href="/argus/" class="link">See what's watching →</a>
      <p class="footnote">bbsusheelkumar.github.io</p>
    </div>
  </body>
  </html>
